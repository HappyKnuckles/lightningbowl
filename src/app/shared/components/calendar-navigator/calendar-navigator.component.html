<ion-toolbar>
  <ion-segment [value]="gameFilterService.calendarMode()" (ionChange)="onModeChange($event)" scrollable="true">
    <ion-segment-button value="daily">
      <ion-label>Day</ion-label>
    </ion-segment-button>
    <ion-segment-button value="weekly">
      <ion-label>Week</ion-label>
    </ion-segment-button>
    <ion-segment-button value="monthly">
      <ion-label>Month</ion-label>
    </ion-segment-button>
    <ion-segment-button value="yearly">
      <ion-label>Year</ion-label>
    </ion-segment-button>
    <ion-segment-button value="overall">
      <ion-label>All</ion-label>
    </ion-segment-button>
  </ion-segment>
</ion-toolbar>
<ion-toolbar class="period-nav-toolbar">
  <ion-buttons slot="start">
    <ion-button fill="clear" (click)="prevPeriod()" [disabled]="gameFilterService.calendarMode() === 'overall'">
      <ion-icon slot="icon-only" name="chevron-back-outline"></ion-icon>
    </ion-button>
  </ion-buttons>
  <ion-title class="period-label">{{ gameFilterService.calendarLabel() }}</ion-title>
  <ion-buttons slot="end">
    <ion-button fill="clear" (click)="nextPeriod()" [disabled]="gameFilterService.calendarMode() === 'overall'">
      <ion-icon slot="icon-only" name="chevron-forward-outline"></ion-icon>
    </ion-button>
  </ion-buttons>
</ion-toolbar>
